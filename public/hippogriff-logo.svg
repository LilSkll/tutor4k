<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Hippogriff mascot logo — minimalist geometric style -->
  <!-- Books (base) -->
  <rect x="20" y="78" width="60" height="8" rx="2" fill="#FFD93D"/>
  <rect x="24" y="72" width="52" height="7" rx="2" fill="#FF6B6B"/>
  <rect x="28" y="66" width="44" height="7" rx="2" fill="#FFA94D"/>

  <!-- Body (horse, curved) -->
  <path d="M40 66 C38 55 42 45 50 42 C52 38 50 33 48 30 L50 25 L53 28 C56 26 59 27 61 30 C64 33 64 38 62 42 C66 46 68 52 66 60 C65 64 62 66 58 67 L42 67 C41 67 40 66 40 66 Z" fill="#E8E8E8" stroke="#2C2C2C" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Eagle head -->
  <ellipse cx="52" cy="24" rx="7" ry="8" fill="#F0F0F0" stroke="#2C2C2C" stroke-width="1.5"/>
  <!-- Beak -->
  <path d="M58 23 L63 25 L58 27 Z" fill="#FFD93D" stroke="#2C2C2C" stroke-width="1"/>
  <!-- Eye -->
  <circle cx="53" cy="22" r="1.8" fill="#2C2C2C"/>
  <circle cx="53.5" cy="21.5" r="0.6" fill="#fff"/>

  <!-- Wing (feathers, spread) -->
  <path d="M48 38 C40 36 32 32 28 25 C27 23 29 21 31 22 C36 24 41 27 45 31 C46 32 47 35 48 38 Z" fill="#D0D0D0" stroke="#2C2C2C" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M44 34 L37 29 M46 36 L40 31 M47 38 L43 33" stroke="#2C2C2C" stroke-width="0.8" opacity="0.5"/>

  <!-- Flag pole behind -->
  <line x1="72" y1="20" x2="72" y2="68" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Flag -->
  <path d="M72 22 L82 26 L80 30 L82 34 L72 32 Z" fill="#EF4444"/>

  <!-- Legs -->
  <line x1="46" y1="66" x2="46" y2="72" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="66" x2="58" y2="72" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>

  <!-- Tail -->
  <path d="M64 55 C70 54 74 52 76 48 C77 50 76 56 72 60 L66 61 Z" fill="#C8C8C8" stroke="#2C2C2C" stroke-width="1.2"/>
</svg>
